      <polygon points="0 0, 10 3.5, 0 7" fill="#7eb8ff"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#0b0f14"/>
  <text x="460" y="28" fill="#e8eef5" font-family="Segoe UI, sans-serif" font-size="18" text-anchor="middle">Bot FSM - Depth Run (dungeon)</text>
  <g font-family="Segoe UI, sans-serif" font-size="12" fill="#e8eef5">
    <circle cx="120" cy="120" r="36" fill="#1a2434" stroke="#7eb8ff" stroke-width="2"/>
    <text x="120" y="125" text-anchor="middle">IDLE</text>
    <circle cx="320" cy="120" r="36" fill="#1a2434" stroke="#7eb8ff" stroke-width="2"/>
    <text x="320" y="125" text-anchor="middle">PATROL</text>
    <circle cx="520" cy="120" r="36" fill="#1a2434" stroke="#7eb8ff" stroke-width="2"/>
    <text x="520" y="125" text-anchor="middle">CHASE</text>
    <circle cx="720" cy="120" r="36" fill="#1a2434" stroke="#7eb8ff" stroke-width="2"/>
