  </g>
  <g stroke="#7eb8ff" stroke-width="1.5" fill="none" marker-end="url(#arrow)">
    <line x1="156" y1="120" x2="284" y2="120"/>
    <line x1="356" y1="120" x2="484" y2="120"/>
    <line x1="556" y1="120" x2="684" y2="120"/>
    <line x1="520" y1="156" x2="440" y2="244"/>
    <line x1="720" y1="156" x2="720" y2="244"/>
    <line x1="384" y1="280" x2="284" y2="156"/>
    <line x1="456" y1="280" x2="684" y2="156"/>
  </g>
  <g font-family="Segoe UI, sans-serif" font-size="10" fill="#a8c4e8">
