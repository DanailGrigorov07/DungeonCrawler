  <text x="40" y="90" fill="#ffd" font-family="Segoe UI, sans-serif" font-size="11">start -&gt; IDLE</text>
  <line x1="70" y1="85" x2="84" y2="120" stroke="#ffd" stroke-width="1.5" marker-end="url(#arrow)"/>
